RESULT_META["凡人_绣娘"]={thing:"铜锁和帕子",where:"窗边绣房",line:"你锁住的不是帕子，是当年没敢敲门的自己。"};
RESULT_META["凡人_采药人"]={thing:"药柜最上层",where:"山脚药庐",line:"你怕好心也会生出祸端，可门外一有响动，你还是会先去开门。"};

var ID_TO_SLUG={};
ID_TO_SLUG["凡人_说书人"]="shuoshuren";
ID_TO_SLUG["凡人_店小二"]="dianxiaoer";
ID_TO_SLUG["凡人_厨子"]="chuzi";
ID_TO_SLUG["凡人_镖师"]="biaoshi";
ID_TO_SLUG["凡人_账房先生"]="zhangfangxiansheng";
ID_TO_SLUG["凡人_绣娘"]="xiuniang";
ID_TO_SLUG["凡人_采药人"]="caiyaoren";
ID_TO_SLUG["凡人_守夜人"]="shouyeren";
var COLORS={};
COLORS["凡人_说书人"]="#9a7536";
COLORS["凡人_店小二"]="#b77943";
COLORS["凡人_厨子"]="#8f7f62";
COLORS["凡人_镖师"]="#4d668b";
COLORS["凡人_账房先生"]="#3f7658";
COLORS["凡人_绣娘"]="#a56772";
COLORS["凡人_采药人"]="#5d8a54";
COLORS["凡人_守夜人"]="#934c3e";
function $(id){return document.getElementById(id)}
function hideAll(){var ids=['splash','test','result','storyPhase','finalStory'];for(var i=0;i<ids.length;i++){$(ids[i]).style.display="none"}}
function recalc(){scores={};for(var qi=0;qi<answers.length;qi++){var idx=answers[qi];var q=QUESTIONS[qi];if(q&&q.opts){var opt=q.opts[idx];if(opt&&opt.s){var ks=Object.keys(opt.s);for(var kk=0;kk<ks.length;kk++){var k=ks[kk];var v=opt.s[k];scores[k]=(scores[k]||0)+v}}}}}
function startTest(){hideAll();$('test').style.display='flex';currentQ=0;answers=[];scores={};selectedId=null;renderQ()}
function renderQ(){var q=QUESTIONS[currentQ];$('progressText').textContent=(currentQ+1)+' / '+QUESTIONS.length;$('progressFill').style.width=((currentQ+1)/QUESTIONS.length*100)+'%';var h='<div class="fade"><div class="chapter">凭第一念选</div><h2 class="question">'+q.q+'</h2><p class="hint">不必求准。哪一句先入了眼，就选哪一句。</p><div class="options">';for(var i=0;i<q.opts.length;i++){var o=q.opts[i];var sel=(answers[currentQ]===i?' selected':'');h+='<button class="option'+sel+'" onclick="choose('+i+')"><span class="mark">'+LETTERS[i]+'</span><span>'+o.t+'</span></button>'}h+='</div><div class="navrow">';if(currentQ>0){h+='<button class="btn ghost" onclick="prevQ()">回上一念</button>'}else{h+='<span></span>'}h+='<button class="btn ghost" onclick="startTest()">重来</button></div></div>';$('questionArea').innerHTML=h}
function choose(i){answers[currentQ]=i;recalc();setTimeout(function(){currentQ++;if(currentQ<QUESTIONS.length){renderQ()}else{showResult()}},160)}
function prevQ(){if(currentQ>0){currentQ--;renderQ()}}
function bestId(){var keys=Object.keys(scores);if(keys.length===0){return Object.keys(IDENTITIES)[0]}var top=0;for(var i=0;i<keys.length;i++){top=Math.max(top,scores[keys[i]])}var tied=[];for(var i=0;i<keys.length;i++){if(scores[keys[i]]===top){tied.push(keys[i])}}return tied[Math.floor(Math.random()*tied.length)]}
function paraText(txt){var s=String(txt||'').replace(/\s+/g,'');var result=s.match(/[^\u3002\uff01\uff1f]*[\u3002\uff01\uff1f]/g);if(!result||result.length===0){return'<p>'+txt+'</p>'}var out='';for(var i=0;i<result.length;i++){out+='<p>'+result[i]+'</p>'}return out}
function showResult(){hideAll();$('result').style.display='flex';selectedId=bestId();var id=IDENTITIES[selectedId];var m=RESULT_META[selectedId]||{};var accent=COLORS[selectedId]||'#7e5f32';var slug=ID_TO_SLUG[selectedId];$('resultContent').innerHTML='<div class="result-head fade"><div class="smalltitle">你的故事落在</div><div class="identity-emoji">'+id.emoji+'</div><div class="identity-name" style="color:'+accent+'">'+id.name+'</div><div class="identity-meta"><span class="pill">旧物：'+(m.thing||'一件旧物')+'</span><span class="pill">所在：'+(m.where||'西游路旁')+'</span></div></div><img class="result-hero-image" src="assets/results/'+slug+'.png" alt="'+id.name+'" loading="lazy"><div class="storybox fade" style="border-color:'+accent+'33"><p style="color:'+accent+';font-weight:700">'+(m.line||'你有一件事，藏在日子深处。')+'</p>'+paraText(id.story)+'</div><div class="actions"><button class="btn" onclick="enterStory()">走进这一世</button><button class="btn secondary" onclick="shareResult()">分享身份</button><button class="btn ghost" onclick="startTest()">再入一世</button></div>'}
function enterStory(){hideAll();$('storyPhase').style.display='flex';storyStep=0;storyChoices=[];renderStory()}
function renderStory(){var steps=STORIES[selectedId];if(!steps||storyStep>=steps.length){showFinal();return}var st=steps[storyStep];$('storyTitle').textContent='这一世的分岔';var h='<div class="storybox fade">'+paraText(st.scene)+'</div><div class="options">';for(var i=0;i<st.choices.length;i++){var c=st.choices[i];h+='<button class="option story-choice" onclick="pickStory('+i+')"><span class="mark">'+LETTERS[i]+'</span><span>'+c.text+'</span></button>'}h+='</div>';$('storyContent').innerHTML=h}
function pickStory(i){storyChoices.push(STORIES[selectedId][storyStep].choices[i]);selectedBranch=(i===0)?'a':'b';storyStep++;renderStory()}
function showFinal(){hideAll();$('finalStory').style.display='flex';var id=IDENTITIES[selectedId];var accent=COLORS[selectedId]||'#7e5f32';var slug=ID_TO_SLUG[selectedId];var ends=STORY_ENDINGS[selectedId]||[];var txt='';for(var si=0;si<storyChoices.length;si++){txt+=storyChoices[si].result||''}if(ends.length>0){txt+=ends[Math.floor(Math.random()*ends.length)]}var branchImg = (selectedBranch&&selectedBranch.length>0)?'<img class="final-branch-image" src="assets/results/'+slug+'_'+selectedBranch+'.png" alt="" loading="lazy">':'';$('finalContent').innerHTML='<div class="reading-title fade"><div class="over">你的故事</div><h2 style="color:'+accent+'">'+id.name+'</h2></div><div class="divider"></div>'+(branchImg||'')+'<article class="reading-text fade">'+paraText(txt)+'</article><div class="divider"></div><div class="actions"><button class="btn" onclick="shareResult()">分享这一世</button><button class="btn secondary" onclick="startTest()">再入一世</button></div>'}
function shareResult(){var id=IDENTITIES[selectedId]||{};var text='我在「三千世界·凡人西游篇」里是「'+(id.name||'凡人')+'」。';if(navigator.share){navigator.share({title:'三千世界·凡人西游篇',text:encodeURI(location.href)}).catch(function(){})}else{var t=document.createElement('textarea');t.value=text+'\\n'+location.href;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);alert('已复制。')}}

/* ===== 统计功能 ===== */
var STATS_KEY='westory_stats';
function recordAnswer(){if(!answers.length)return;var chosen=bestId();try{var data=JSON.parse(localStorage.getItem(STATS_KEY)||'{}');var v=data.version||0;data.version=v+1;if(!data.records)data.records=[];data.records.push({time:Date.now(),answers:answers.slice(),result:chosen});if(data.records.length>1000)data.records=data.records.slice(-1000);localStorage.setItem(STATS_KEY,JSON.stringify(data))}catch(e){}}
function showStats(){var raw=localStorage.getItem(STATS_KEY);if(!raw){alert('暂无统计数据');return}var data=JSON.parse(raw);var records=data.records||[];if(!records.length){alert('暂无统计数据');return}var total=records.length;var qCount=QUESTIONS.length;var qTitles=QUESTIONS.map(function(q){return q.q.slice(0,16)});var identCount={},optionCounts=[];for(var i=0;i<qCount;i++)optionCounts[i]=[0,0,0,0];records.forEach(function(r){var id=r.result;identCount[id]=(identCount[id]||0)+1;if(r.answers){for(var qi=0;qi<Math.min(r.answers.length,qCount);qi++){var opt=r.answers[qi];if(opt>=0&&opt<4)optionCounts[qi][opt]=(optionCounts[qi][opt]||0)+1}}});var h='<div class="inner"><div class="choice-title">📊 统计数据（共'+total+'次测试）</div><div class="divider"></div>';h+='<div style="margin-bottom:24px"><div class="smalltitle">身份分布</div>';var sorted=Object.keys(identCount).sort(function(a,b){return identCount[b]-identCount[a]});sorted.forEach(function(id){var pct=(identCount[id]/total*100).toFixed(1);var emoji=IDENTITIES[id]?IDENTITIES[id].emoji:'';var name=IDENTITIES[id]?IDENTITIES[id].name:id;h+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line)"><span>'+emoji+' '+name+'</span><span style="font-weight:700">'+identCount[id]+'次 ('+pct+'%)</span></div>'});h+='</div>';for(var qi=0;qi<qCount;qi++){var qT=QUESTIONS[qi].q.slice(0,20)+'…';h+='<div style="margin-bottom:16px"><div class="smalltitle" style="font-size:12px;text-align:left">Q'+(qi+1)+' '+qT+'</div>';var totalOpt=optionCounts[qi].reduce(function(a,b){return a+b},0)||1;for(var oi=0;oi<4;oi++){var pct2=(optionCounts[qi][oi]/totalOpt*100).toFixed(1);var barW=Math.max(3,pct2*2);h+='<div style="display:flex;align-items:center;gap:8px;margin:3px 0;font-size:13px"><span style="width:16px;font-weight:700">'+['A','B','C','D'][oi]+'</span><div style="height:16px;width:'+barW+'px;background:var(--green);border-radius:4px;min-width:3px"></div><span>'+pct2+'%</span></div>'}h+='</div>'}h+='<div class="actions"><button class="btn ghost" onclick="document.getElementById(\'statsDialog\').style.display=\'none\'">关闭</button><button class="btn ghost" onclick="if(confirm(\'确定清除所有统计数据？\')){localStorage.removeItem(\''+STATS_KEY+'\');document.getElementById(\'statsDialog\').style.display=\'none\'}">清除数据</button></div></div>';var d=$('statsDialog');if(!d){d=document.createElement('div');d.id='statsDialog';d.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;padding:16px';d.innerHTML='<div style="max-height:90vh;overflow-y:auto;width:min(600px,100%)">'+h+'</div>';document.body.appendChild(d)}else{d.style.display='flex';d.querySelector('.inner').innerHTML=h}}
/* 在每个 result 后面记录 */
var _origShowResult=showResult;showResult=function(){_origShowResult();setTimeout(recordAnswer,100)}
